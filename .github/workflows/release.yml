name: Release

# Triggered by pushing a semver tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# A single create-release job makes the draft first; the build matrix uploads into
# it by id (parallel jobs creating releases by tag race and produce duplicate
# drafts — happened on v0.1.0). Publish the draft manually after checking assets.
# Linux builds intentionally run on ubuntu-22.04 (oldest supported glibc baseline).

on:
  push:
    tags: ['v*']

jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const v = tag.replace(/^v/, '')
            const dl = (f) => `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${f}`
            const body = [
              `**Outfitter** installs software through your OS's own trusted package manager (winget, Homebrew, Flatpak) — it never hosts or redistributes third-party installers.`,
              ``,
              `## 🍎 Mac`,
              `- **Apple Silicon (M1–M4):** [Outfitter_${v}_aarch64.dmg](${dl(`Outfitter_${v}_aarch64.dmg`)})`,
              `- **Intel:** [Outfitter_${v}_x64.dmg](${dl(`Outfitter_${v}_x64.dmg`)})`,
              ``,
              `Not yet code-signed: after installing, allow it via **System Settings → Privacy & Security → Open Anyway**.`,
              ``,
              `## 🪟 Windows`,
              `- **Installer (recommended):** [Outfitter_${v}_x64-setup.exe](${dl(`Outfitter_${v}_x64-setup.exe`)})`,
              `- MSI (managed installs): [Outfitter_${v}_x64_en-US.msi](${dl(`Outfitter_${v}_x64_en-US.msi`)})`,
              ``,
              `Not yet code-signed: if SmartScreen appears, click **More info → Run anyway**. Requires winget (preinstalled on Windows 11 / updated Windows 10).`,
              ``,
              `## 🐧 Linux`,
              `- **AppImage (any distro):** [Outfitter_${v}_amd64.AppImage](${dl(`Outfitter_${v}_amd64.AppImage`)})`,
              `- **Debian/Ubuntu:** [Outfitter_${v}_amd64.deb](${dl(`Outfitter_${v}_amd64.deb`)})`,
              `- **Fedora:** [Outfitter-${v}-1.x86_64.rpm](${dl(`Outfitter-${v}-1.x86_64.rpm`)})`,
            ].join('\n')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Outfitter ${tag}`,
              body,
              draft: true,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  # Builds latest.json AFTER all builders finish, from the signed assets they
  # attached. The builders themselves have includeUpdaterJson disabled because
  # tauri-action's own per-job read-merge-reupload of latest.json is an
  # unlocked lost-update race across parallel matrix jobs — a platform can be
  # silently dropped from the manifest. Windows deliberately points at the
  # NSIS setup.exe (the release page's "recommended" installer): serving the
  # MSI to NSIS installs creates duplicate side-by-side installs
  # (tauri-action#1027). MSI users update by downloading the MSI manually.
  updater-manifest:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number('${{ needs.create-release.outputs.release_id }}')
            const tag = context.ref.replace('refs/tags/', '')
            const v = tag.replace(/^v/, '')
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            })
            const sig = async (name) => {
              const asset = assets.find((a) => a.name === name)
              if (!asset) throw new Error(`missing updater asset: ${name} — was this platform's build signed?`)
              const res = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              })
              return Buffer.from(res.data).toString('utf8')
            }
            const dl = (f) => `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${f}`
            const entries = {
              'darwin-aarch64': `Outfitter_${v}_aarch64.app.tar.gz`,
              'darwin-x86_64': `Outfitter_${v}_x64.app.tar.gz`,
              'linux-x86_64': `Outfitter_${v}_amd64.AppImage`,
              'windows-x86_64': `Outfitter_${v}_x64-setup.exe`,
            }
            const platforms = {}
            for (const [key, file] of Object.entries(entries)) {
              platforms[key] = { url: dl(file), signature: await sig(`${file}.sig`) }
            }
            const manifest = {
              version: v,
              notes: `Outfitter ${tag} — https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
              pub_date: new Date().toISOString(),
              platforms,
            }
            const existing = assets.find((a) => a.name === 'latest.json')
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: JSON.stringify(manifest, null, 2),
              headers: { 'content-type': 'application/json' },
            })
            core.info(`latest.json uploaded with platforms: ${Object.keys(platforms).join(', ')}`)
