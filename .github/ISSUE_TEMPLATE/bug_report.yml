name: Bug report
description: Something in Outfitter is not working right
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Auto-filled when submitted from the Outfitter app. Otherwise, your OS and app version.
      render: text
